<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="manifest" href="manifest.json">
  <title>VaultDroid</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1a1a1a;
      --surface:    #242424;
      --border:     #2e2e2e;
      --border-mid: #333;
      --text:       #f0f0f0;
      --text-muted: #aaa;
      --accent:     #4f8ef7;
      --accent-hov: #6ba3ff;
      --error-bg:   #2a1a1a;
      --error-text: #ff6b6b;
      --radius-sm:  8px;
      --radius-md:  12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .header-title span { color: var(--accent); }

    #settings-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: color 0.15s, background 0.15s;
    }
    #settings-btn:hover { color: var(--text); background: var(--border); }
    #settings-btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

    #settings-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-md);
      min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      overflow: hidden;
      z-index: 100;
    }
    #settings-dropdown.open { display: block; }

    .dropdown-item {
      display: block;
      width: 100%;
      padding: 12px 16px;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      transition: background 0.12s;
    }
    .dropdown-item:hover { background: var(--border); }
    .dropdown-item:focus-visible { outline: 3px solid var(--accent); outline-offset: -3px; }
    .dropdown-item.danger { color: var(--error-text); }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 24px 20px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Cards grid ── */
    #cards-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    @media (min-width: 640px)  { #cards-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { #cards-grid { grid-template-columns: repeat(3, 1fr); } }

    /* ── Release card ── */
    .release-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .card-app-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }

    .card-version {
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border-mid);
      border-radius: 4px;
      padding: 2px 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-repo {
      font-size: 12px;
      color: #666;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    .card-date { font-size: 13px; color: var(--text-muted); }
    .card-footer { margin-top: 4px; }

    .btn-download {
      display: block;
      width: 100%;
      min-height: 44px;
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      text-align: center;
    }
    .btn-download:hover:not(:disabled) { background: var(--accent-hov); }
    .btn-download:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-download:focus-visible { outline: 3px solid var(--accent-hov); outline-offset: 3px; }
    .btn-download.btn--error { background: #7a2020; color: var(--error-text); }

    .no-apk-label {
      display: block;
      width: 100%;
      min-height: 44px;
      padding: 10px 20px;
      background: var(--bg);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 14px;
      border: 1px solid var(--border-mid);
      border-radius: 22px;
      text-align: center;
      line-height: 24px;
    }

    /* ── Loading ── */
    #loading-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 64px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
    #loading-state.visible { display: flex; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border-mid);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      background: var(--error-bg);
      border: 1px solid #4a2020;
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      color: var(--error-text);
      font-size: 14px;
      margin-bottom: 20px;
      white-space: pre-wrap;
    }
    #error-banner.visible { display: block; }

    /* ── Empty state ── */
    #empty-state {
      display: none;
      padding: 64px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }
    #empty-state.visible { display: block; }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #modal-overlay.visible { display: flex; }

    #setup-modal {
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-md);
      padding: 32px 28px;
      width: 100%;
      max-width: 460px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .modal-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .form-section {
      margin-bottom: 24px;
    }

    .form-section-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      display: block;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 0;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }

    input[type="text"],
    input[type="password"] {
      background: var(--bg);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      padding: 10px 12px;
      transition: border-color 0.15s;
      width: 100%;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.2);
    }
    input::placeholder { color: #555; }

    /* Repo add row */
    .repo-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .repo-input-row input { flex: 1; }

    .btn-add-repo {
      background: var(--border);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      padding: 10px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
    }
    .btn-add-repo:hover { background: #3a3a3a; }
    .btn-add-repo:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

    /* Repo chips */
    .repo-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 24px;
    }

    .repo-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border-mid);
      border-radius: 20px;
      padding: 4px 10px 4px 12px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      color: var(--text);
    }

    .chip-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      display: flex;
      align-items: center;
      border-radius: 50%;
      transition: color 0.12s;
    }
    .chip-remove:hover { color: var(--error-text); }
    .chip-remove:focus-visible { outline: 2px solid var(--accent); }

    .repo-hint {
      font-size: 12px;
      color: #555;
      margin-top: 8px;
    }

    .modal-error {
      font-size: 13px;
      color: var(--error-text);
      margin-bottom: 12px;
      display: none;
    }
    .modal-error.visible { display: block; }

    .btn-primary {
      display: block;
      width: 100%;
      min-height: 44px;
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }
    .btn-primary:hover { background: var(--accent-hov); }
    .btn-primary:focus-visible { outline: 3px solid var(--accent-hov); outline-offset: 3px; }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-title">Vault<span>Droid</span></div>
    <div style="position:relative;">
      <button id="settings-btn" aria-label="Settings" aria-haspopup="true" aria-expanded="false">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <div id="settings-dropdown" role="menu">
        <button class="dropdown-item" id="edit-settings-btn" role="menuitem">Edit Settings</button>
        <button class="dropdown-item danger" id="signout-btn" role="menuitem">Sign Out</button>
      </div>
    </div>
  </header>

  <main>
    <div id="error-banner" role="alert" aria-live="polite"></div>
    <div id="loading-state" aria-label="Loading releases">
      <div class="spinner" aria-hidden="true"></div>
      <span>Fetching releases…</span>
    </div>
    <div id="empty-state" aria-live="polite">No releases found.</div>
    <div id="cards-grid" aria-label="App releases"></div>
  </main>

</div>

<!-- Setup Modal -->
<div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div id="setup-modal">
    <div class="modal-title" id="modal-title">Connect to GitHub</div>
    <div class="modal-subtitle">Stored locally. Never sent anywhere except GitHub's API.</div>

    <form id="setup-form" novalidate>

      <!-- PAT -->
      <div class="form-section">
        <span class="form-section-label">Personal Access Token</span>
        <div class="form-group">
          <input
            type="password"
            id="input-pat"
            placeholder="ghp_…"
            autocomplete="current-password"
            spellcheck="false"
          >
        </div>
        <p class="repo-hint">Fine-grained token → Repository permissions → Contents: Read-only (+ Metadata: Read-only, auto-required)</p>
      </div>

      <!-- Repos -->
      <div class="form-section">
        <span class="form-section-label">Repositories</span>
        <div class="repo-input-row">
          <input
            type="text"
            id="input-repo"
            placeholder="owner/repo"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
          >
          <button type="button" class="btn-add-repo" id="add-repo-btn">Add</button>
        </div>
        <div class="repo-chips" id="repo-chips" aria-label="Added repositories"></div>
        <p class="repo-hint" id="repo-count-hint"></p>
      </div>

      <div class="modal-error" id="modal-error"></div>
      <button type="submit" class="btn-primary">Save &amp; Connect</button>
    </form>
  </div>
</div>

<script>
'use strict';

// ── Storage keys ──────────────────────────────────────────────────────────────
const KEY_PAT   = 'vd_pat';
const KEY_REPOS = 'vd_repos'; // JSON array of "owner/repo" strings

// ── DOM refs ──────────────────────────────────────────────────────────────────
const modalOverlay    = document.getElementById('modal-overlay');
const setupForm       = document.getElementById('setup-form');
const inputPat        = document.getElementById('input-pat');
const inputRepo       = document.getElementById('input-repo');
const addRepoBtn      = document.getElementById('add-repo-btn');
const repoChipsEl     = document.getElementById('repo-chips');
const repoCountHint   = document.getElementById('repo-count-hint');
const modalError      = document.getElementById('modal-error');
const cardsGrid       = document.getElementById('cards-grid');
const loadingState    = document.getElementById('loading-state');
const errorBanner     = document.getElementById('error-banner');
const emptyState      = document.getElementById('empty-state');
const settingsBtn     = document.getElementById('settings-btn');
const settingsDrop    = document.getElementById('settings-dropdown');
const editSettingsBtn = document.getElementById('edit-settings-btn');
const signoutBtn      = document.getElementById('signout-btn');

// ── In-modal repo list state ──────────────────────────────────────────────────
let _modalRepos = [];

// ── Config ────────────────────────────────────────────────────────────────────
function loadConfig() {
  const pat   = localStorage.getItem(KEY_PAT);
  const repos = parseRepos(localStorage.getItem(KEY_REPOS));
  if (pat && repos.length) return { pat, repos };
  return null;
}

function saveConfig(pat, repos) {
  localStorage.setItem(KEY_PAT,   pat.trim());
  localStorage.setItem(KEY_REPOS, JSON.stringify(repos));
}

function parseRepos(raw) {
  try {
    const arr = JSON.parse(raw || '[]');
    return Array.isArray(arr) ? arr.filter(s => /^[^/]+\/[^/]+$/.test(s)) : [];
  } catch { return []; }
}

// ── Modal repo chip UI ────────────────────────────────────────────────────────
function renderChips() {
  repoChipsEl.innerHTML = '';
  _modalRepos.forEach((slug, i) => {
    const chip = document.createElement('span');
    chip.className = 'repo-chip';
    chip.innerHTML = `${escHtml(slug)}<button class="chip-remove" aria-label="Remove ${escHtml(slug)}" data-idx="${i}">&times;</button>`;
    chip.querySelector('.chip-remove').addEventListener('click', () => {
      _modalRepos.splice(i, 1);
      renderChips();
    });
    repoChipsEl.appendChild(chip);
  });
  repoCountHint.textContent = _modalRepos.length
    ? `${_modalRepos.length} repo${_modalRepos.length > 1 ? 's' : ''} added`
    : 'Add at least one repository.';
}

function addRepo() {
  const val = inputRepo.value.trim();
  if (!val) return;
  if (!/^[^/]+\/[^/]+$/.test(val)) {
    showModalError('Format must be owner/repo — e.g. SekeNikola/voizapp');
    return;
  }
  if (_modalRepos.includes(val)) {
    showModalError('Already added.');
    return;
  }
  _modalRepos.push(val);
  inputRepo.value = '';
  clearModalError();
  renderChips();
}

addRepoBtn.addEventListener('click', addRepo);
inputRepo.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); addRepo(); }
});

// ── Modal show/hide ───────────────────────────────────────────────────────────
function showSetupModal(prefill = false) {
  clearModalError();
  if (prefill) {
    const cfg = loadConfig();
    inputPat.value = '';
    _modalRepos = cfg ? [...cfg.repos] : [];
  } else {
    inputPat.value = '';
    _modalRepos = [];
  }
  renderChips();
  modalOverlay.classList.add('visible');
  requestAnimationFrame(() => inputPat.focus());
}

function hideSetupModal() {
  modalOverlay.classList.remove('visible');
}

function showModalError(msg) {
  modalError.textContent = msg;
  modalError.classList.add('visible');
}

function clearModalError() {
  modalError.classList.remove('visible');
}

// Submit
setupForm.addEventListener('submit', e => {
  e.preventDefault();
  const pat = inputPat.value.trim();
  if (!pat) { showModalError('Enter your Personal Access Token.'); return; }
  if (!_modalRepos.length) { showModalError('Add at least one repository.'); return; }
  saveConfig(pat, _modalRepos);
  hideSetupModal();
  fetchReleases();
});

// Close on overlay click (only if already configured)
modalOverlay.addEventListener('click', e => {
  if (e.target === modalOverlay && loadConfig()) hideSetupModal();
});

// ── UI state ──────────────────────────────────────────────────────────────────
function showLoading() {
  loadingState.classList.add('visible');
  errorBanner.classList.remove('visible');
  emptyState.classList.remove('visible');
  cardsGrid.innerHTML = '';
}

function hideLoading() {
  loadingState.classList.remove('visible');
}

function showError(message) {
  hideLoading();
  errorBanner.textContent = message;
  errorBanner.classList.add('visible');
  cardsGrid.innerHTML = '';
  emptyState.classList.remove('visible');
}

// ── fetchReleases — all repos in parallel ─────────────────────────────────────
async function fetchReleases() {
  const cfg = loadConfig();
  if (!cfg) return;

  showLoading();
  errorBanner.classList.remove('visible');

  const results = await Promise.allSettled(
    cfg.repos.map(slug => fetchRepoReleases(slug, cfg.pat))
  );

  hideLoading();

  const allCards = [];
  const errors   = [];
  const notFound = [];

  results.forEach((r, i) => {
    if (r.status === 'fulfilled') {
      allCards.push(...r.value);
    } else if (r.reason.notFound) {
      notFound.push(cfg.repos[i]);
    } else {
      errors.push(`${cfg.repos[i]}: ${r.reason.message}`);
    }
  });

  if (notFound.length) {
    const updatedRepos = cfg.repos.filter(s => !notFound.includes(s));
    localStorage.setItem(KEY_REPOS, JSON.stringify(updatedRepos));
    errors.unshift(`Removed (not found): ${notFound.join(', ')}`);
  }

  if (errors.length) {
    errorBanner.textContent = errors.join('\n');
    errorBanner.classList.add('visible');
  }

  allCards.sort((a, b) => b.publishedAt - a.publishedAt);
  renderCards(allCards);
}

async function fetchRepoReleases(slug, pat) {
  const [owner, repo] = slug.split('/');
  const url = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/releases?per_page=100`;

  const res = await fetch(url, {
    headers: {
      'Authorization': `Bearer ${pat}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
    }
  });

  if (res.status === 401) throw new Error('Token invalid or expired');
  if (res.status === 403) throw new Error('Token lacks repo read permission');
  if (res.status === 404) { const e = new Error('not found'); e.notFound = true; throw e; }
  if (!res.ok)            throw new Error(`HTTP ${res.status}`);

  const data = await res.json();
  return data.map(r => ({
    id:          r.id,
    appName:     r.name || r.tag_name,
    version:     r.tag_name,
    publishedAt: new Date(r.published_at),
    apkAsset:    r.assets.find(a => a.name.endsWith('.apk')) ?? null,
    repoSlug:    slug,
  }));
}

// ── renderCards ───────────────────────────────────────────────────────────────
function renderCards(cards) {
  cardsGrid.innerHTML = '';

  if (!cards.length) {
    emptyState.classList.add('visible');
    return;
  }
  emptyState.classList.remove('visible');

  cards.forEach(card => {
    const el = document.createElement('article');
    el.className = 'release-card';
    el.setAttribute('aria-label', `${card.appName} ${card.version}`);

    const dateStr = card.publishedAt.toLocaleDateString('en-GB', {
      day: '2-digit', month: 'short', year: 'numeric'
    });

    const footerHtml = card.apkAsset
      ? `<button class="btn-download" aria-label="Download ${escHtml(card.appName)} APK">Download</button>`
      : `<span class="no-apk-label" aria-label="No APK available">No APK</span>`;

    el.innerHTML = `
      <div class="card-header">
        <div class="card-app-name">${escHtml(card.appName)}</div>
        <span class="card-version" aria-label="Version ${escHtml(card.version)}">${escHtml(card.version)}</span>
      </div>
      <div class="card-repo">${escHtml(card.repoSlug)}</div>
      <div class="card-date">${escHtml(dateStr)}</div>
      <div class="card-footer">${footerHtml}</div>
    `;

    if (card.apkAsset) {
      el.querySelector('.btn-download').addEventListener('click', function() {
        downloadApk(card.apkAsset, card.repoSlug, this);
      });
    }

    cardsGrid.appendChild(el);
  });
}

// ── downloadApk ───────────────────────────────────────────────────────────────
async function downloadApk(asset, repoSlug, btn) {
  const cfg = loadConfig();
  if (!cfg) return;

  btn.textContent = 'Downloading…';
  btn.disabled = true;
  btn.classList.remove('btn--error');

  try {
    const [owner, repo] = repoSlug.split('/');
    const apiUrl = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/releases/assets/${asset.id}`;

    const res = await fetch(apiUrl, {
      headers: {
        'Authorization': `Bearer ${cfg.pat}`,
        'Accept': 'application/octet-stream',
        'X-GitHub-Api-Version': '2022-11-28',
      }
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const blob      = URL.createObjectURL(await res.blob());
    const anchor    = Object.assign(document.createElement('a'), { href: blob, download: asset.name, style: 'display:none' });
    document.body.appendChild(anchor);
    anchor.click();
    document.body.removeChild(anchor);
    setTimeout(() => URL.revokeObjectURL(blob), 500);

    btn.textContent = 'Download';
    btn.disabled = false;
  } catch {
    btn.textContent = 'Failed — Retry';
    btn.disabled = false;
    btn.classList.add('btn--error');
  }
}

// ── Settings dropdown ─────────────────────────────────────────────────────────
settingsBtn.addEventListener('click', e => {
  e.stopPropagation();
  const open = settingsDrop.classList.toggle('open');
  settingsBtn.setAttribute('aria-expanded', String(open));
});

document.addEventListener('click', () => {
  if (settingsDrop.classList.contains('open')) {
    settingsDrop.classList.remove('open');
    settingsBtn.setAttribute('aria-expanded', 'false');
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (settingsDrop.classList.contains('open')) {
      settingsDrop.classList.remove('open');
      settingsBtn.setAttribute('aria-expanded', 'false');
      settingsBtn.focus();
    } else if (modalOverlay.classList.contains('visible') && loadConfig()) {
      hideSetupModal();
    }
  }
});

editSettingsBtn.addEventListener('click', () => {
  settingsDrop.classList.remove('open');
  settingsBtn.setAttribute('aria-expanded', 'false');
  showSetupModal(true);
});

signoutBtn.addEventListener('click', () => {
  [KEY_PAT, KEY_REPOS].forEach(k => localStorage.removeItem(k));
  location.reload();
});

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  loadConfig() ? fetchReleases() : showSetupModal(false);
});
</script>

<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
